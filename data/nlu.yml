version: "3.1"

nlu:
  #  Greeting
  - intent: greet
    examples: |
      - hey
      - hello
      - hi
      - hlo
      - hello there
      - good morning
      - good evening
      - hey buddy
      - hi there

  #  Casual conversation
  - intent: casual_talk
    examples: |
      - what are you doing
      - what are you doing now
      - what are you up to
      - how are you
      - how are you doing
      - what's up
      - how is your day
      - tell me something
      - talk to me
      - what’s going on

  #  Ask bot name
  - intent: ask_name
    examples: |
      - what is your name
      - who are you
      - tell me your name
      - your name?
      - what should I call you

  #  Positive mood
  - intent: mood_great
    examples: |
      - I am good
      - I'm good
      - I feel good
      - I am fine
      - doing well
      - I am happy
      - feeling great
      - I am good what about you
      - I'm doing good what about you
      - I feel good how about you
      - all good
      - everything is good

  #  Negative mood
  - intent: mood_unhappy
    examples: |
      - I am sad
      - I feel sad
      - I am feeling very sad today
      - I am depressed
      - not feeling good
      - I am upset
      - I feel bad
      - I'm not okay
      - I am not happy

  #  Risky / unsafe queries
  - intent: risky_question
    examples: |
      - how to make poison
      - how to make bomb
      - how to hack system
      - how to kill someone
      - illegal hacking methods
      - dangerous chemical making

  #  Goodbye
  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you later
      - talk later
      - catch you later

  #  Bot identity
  - intent: bot_challenge
    examples: |
      - are you a bot?
      - are you human?
      - am I talking to a bot
      - are you real

  - intent: user_check
    examples: |
      - are you listening to me
      - are you there
      - can you hear me
      - are you paying attention
      - do you understand me
  - intent: ask_personal
    examples: |
      - where are you from
      - do you have friends
      - what do you like
      - tell me about yourself

  - intent: ask_opinion
    examples: |
      - what do you think about AI
      - is coding hard
      - is life difficult
      - do you like chatting

  - intent: continue_conversation
    examples: |
      - hmm
      - okay
      - oh nice
      - interesting
      - really
      - then what

  - intent: ask_help
    examples: |
      - can you help me
      - I need help
      - help me with something
