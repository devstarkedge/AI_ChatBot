version: "3.1"

intents:
  - greet
  - goodbye
  - mood_great
  - mood_unhappy
  - bot_challenge
  - casual_talk
  - ask_name
  - risky_question
  - nlu_fallback
  - user_check
  - ask_personal
  - ask_opinion
  - continue_conversation
  - ask_help

responses:
  # Only keep minimal fallback/safety (optional)
  utter_risky_block:
    - text: "Sorry, I can’t help with that request."

actions:
  - action_smart_reply

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
